# Agent Registry source of truth.
#
# The Orchestrator never imports an agent class directly -- it calls
# AgentRegistry.get(name), which resolves the class from this file.
# Add a new agent by adding an entry here plus the agent module itself;
# no changes to backend/app/orchestrator/engine.py are required.
#
# reviewer:
#   module: agents.reviewer_agent.agent:ReviewerAgent
#   config: agents/reviewer_agent/config.yaml
agents:
  test_case_generator:
    module: agents.test_case_generator.agent:TestCaseGeneratorAgent
    config: agents/test_case_generator/config.yaml
  automation:
    module: agents.automation_agent.agent:AutomationAgent
    config: agents/automation_agent/config.yaml
